name: Spendsense Integrated CI/CD Multi-Environment

on:
  push:
    branches:
      - development
      - main

jobs:
  automation-testing:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Setup Java Environment
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Project Dependencies
      run: flutter pub get

    - name: Run Unit and Feature Tests
      run: flutter test

  build-and-deployment:
    needs: automation-testing
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: acrspendsensepso.azurecr.io
        username: acrspendsensepso
        password: 7mgtnggzf5DuYy7dFqh4gbeTuGk12imVJAy1xdhddWhz919vvwbnJQQJ99CFACyXRr3Eqg7NAAACAZCRf2cC

    - name: Set Environment Configuration
      run: |
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          echo "TARGET_WEBAPP=spendsense-production-app" >> $GITHUB_ENV
          echo "SECRET_PROFILE=AZURE_WEBAPP_PRODUCTION_PUBLISH_PROFILE" >> $GITHUB_ENV
        else
          echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          echo "TARGET_WEBAPP=spendsense-staging-app" >> $GITHUB_ENV
          echo "SECRET_PROFILE=AZURE_WEBAPP_STAGING_PUBLISH_PROFILE" >> $GITHUB_ENV
        fi

    - name: Build and Push Image to ACR
      run: |
        docker build \
          --build-arg SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          --build-arg SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
          -t ${{ secrets.ACR_USERNAME }}.azurecr.io/spendsense-web:${{ env.IMAGE_TAG }} .
        docker push ${{ secrets.ACR_USERNAME }}.azurecr.io/spendsense-web:${{ env.IMAGE_TAG }}

    - name: Deploy Container to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.TARGET_WEBAPP }}
        publish-profile: ${{ env.SECRET_PROFILE }}
        images: '${{ secrets.ACR_USERNAME }}.azurecr.io/spendsense-web:${{ env.IMAGE_TAG }}'